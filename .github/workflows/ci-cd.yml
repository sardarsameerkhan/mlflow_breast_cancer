name: CI CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-test-train:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: file:./mlruns
          ENABLE_MODEL_REGISTRY: "false"
        run: python src/train.py

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: best-model
          path: models/best_model.joblib

      - name: Deploy best model to Hugging Face
        if: ${{ github.ref == 'refs/heads/main' && secrets.HF_TOKEN != '' && vars.HF_REPO_ID != '' }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO_ID: ${{ vars.HF_REPO_ID }}
        run: python src/deploy_to_huggingface.py
